name: Build srcds-autocomplete

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: srcds-autocomplete-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-deps-linux:
    runs-on: ubuntu-22.04
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv make gcc-multilib g++-multilib clang zip

      - name: Resolve dependency cache key
        id: cache-key
        shell: bash
        run: |
          echo "key=linux-deps-${{ runner.os }}-${{ hashFiles('scripts/fetch-linux-deps.sh', 'scripts/build-linux-l4d2.sh', 'Makefile', 'configure.py', 'AMBuildScript', 'AMBuilder', 'PackageScript') }}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        id: deps-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: .deps
          key: ${{ steps.cache-key.outputs.key }}

      - name: Fetch build dependencies
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        shell: bash
        run: make deps-linux

      - name: Save dependency cache
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .deps
          key: ${{ steps.cache-key.outputs.key }}

  build-linux:
    runs-on: ubuntu-22.04
    needs: prepare-deps-linux
    outputs:
      basename: ${{ steps.artifact.outputs.basename }}
      release-tag: ${{ steps.artifact.outputs.release_tag }}
      release-name: ${{ steps.artifact.outputs.release_name }}
      prerelease: ${{ steps.artifact.outputs.prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv make gcc-multilib g++-multilib clang zip

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: .deps
          key: ${{ needs.prepare-deps-linux.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build extension
        shell: bash
        run: make build-linux

      - name: Resolve Linux artifact metadata
        id: artifact
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              echo "basename=srcds-autocomplete-linux-latest" >> "$GITHUB_OUTPUT"
              echo "release_tag=channel/latest" >> "$GITHUB_OUTPUT"
              echo "release_name=Latest" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "basename=srcds-autocomplete-linux-develop" >> "$GITHUB_OUTPUT"
              echo "release_tag=channel/develop" >> "$GITHUB_OUTPUT"
              echo "release_name=Develop" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "basename=srcds-autocomplete-linux-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "release_tag=" >> "$GITHUB_OUTPUT"
              echo "release_name=" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Prepare Linux release archive
        shell: bash
        run: |
          mkdir -p dist/release
          (
            cd ".build/linux-l4d2/package"
            zip -r "$GITHUB_WORKSPACE/dist/release/${{ steps.artifact.outputs.basename }}.zip" addons
          )

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.basename }}
          path: dist/release/${{ steps.artifact.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

  prepare-deps-windows:
    runs-on: windows-2022
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve dependency cache key
        id: cache-key
        shell: bash
        run: |
          echo "key=windows-deps-${{ runner.os }}-${{ hashFiles('scripts/fetch-windows-deps.ps1', 'scripts/build-windows-l4d2.ps1', 'Makefile', 'configure.py', 'AMBuildScript', 'AMBuilder', 'PackageScript') }}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        id: deps-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: .deps
          key: ${{ steps.cache-key.outputs.key }}

      - name: Fetch Windows build dependencies
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: make deps-windows

      - name: Save dependency cache
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .deps
          key: ${{ steps.cache-key.outputs.key }}

  build-windows:
    runs-on: windows-2022
    needs: prepare-deps-windows
    outputs:
      basename: ${{ steps.artifact.outputs.basename }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: .deps
          key: ${{ needs.prepare-deps-windows.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build Windows extension
        shell: pwsh
        run: make build-windows

      - name: Resolve Windows artifact metadata
        id: artifact
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              echo "basename=srcds-autocomplete-windows-latest" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "basename=srcds-autocomplete-windows-develop" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "basename=srcds-autocomplete-windows-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Prepare Windows archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\release | Out-Null
          Compress-Archive -Path ".build\windows-l4d2\package\addons" -DestinationPath "dist\release\${{ steps.artifact.outputs.basename }}.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.basename }}
          path: dist/release/${{ steps.artifact.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

  publish:
    runs-on: ubuntu-22.04
    needs: [build-linux, build-windows]
    if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'develop')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-linux.outputs.basename }}
          path: dist/release

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-windows.outputs.basename }}
          path: dist/release

      - name: Move channel tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ needs.build-linux.outputs.release-tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ needs.build-linux.outputs.release-tag }}" --force

      - name: Publish channel release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ needs.build-linux.outputs.release-tag }}"
          title="${{ needs.build-linux.outputs.release-name }}"
          linux_asset="dist/release/${{ needs.build-linux.outputs.basename }}.zip"
          windows_asset="dist/release/${{ needs.build-windows.outputs.basename }}.zip"

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "${{ needs.build-linux.outputs.prerelease }}" == "true" ]]; then
              gh release edit "$tag" --title "$title" --prerelease --latest=false
            else
              gh release edit "$tag" --title "$title" --latest=false
            fi
          else
            if [[ "${{ needs.build-linux.outputs.prerelease }}" == "true" ]]; then
              gh release create "$tag" --title "$title" --prerelease --latest=false --target "$GITHUB_SHA"
            else
              gh release create "$tag" --title "$title" --latest=false --target "$GITHUB_SHA"
            fi
          fi

          gh release upload "$tag" "$linux_asset" "$windows_asset" --clobber
