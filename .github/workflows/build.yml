name: Build srcds-autocomplete

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    paths:
      - .github/workflows/build.yml
      - scripts/**
      - Makefile
      - plugin-package-map.json
      - configure.py
      - AMBuildScript
      - AMBuilder
      - PackageScript
      - extension/**
      - gamedata/**
      - README.md
      - LICENSE
      - docs/**
  workflow_dispatch:

concurrency:
  group: srcds-autocomplete-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deps-exts-linux:
    runs-on: ubuntu-22.04
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv make gcc-multilib g++-multilib clang

      - name: Resolve dependency cache key
        id: cache-key
        shell: bash
        run: |
          echo "key=exts-linux-deps-${{ runner.os }}-${{ hashFiles('scripts/fetch-linux-deps.sh', 'scripts/build-linux-l4d2.sh', 'scripts/stage-artifact.py', 'scripts/package-release.py', 'plugin-package-map.json', 'Makefile', 'configure.py', 'AMBuildScript', 'PackageScript') }}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        id: deps-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: .deps/exts-linux
          key: ${{ steps.cache-key.outputs.key }}

      - name: Fetch Linux extension dependencies
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        shell: bash
        run: make deps-exts-linux

      - name: Save dependency cache
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .deps/exts-linux
          key: ${{ steps.cache-key.outputs.key }}

  build-exts-linux:
    runs-on: ubuntu-22.04
    needs: deps-exts-linux
    outputs:
      basename: ${{ steps.artifact.outputs.basename }}
      release-tag: ${{ steps.artifact.outputs.release_tag }}
      release-name: ${{ steps.artifact.outputs.release_name }}
      prerelease: ${{ steps.artifact.outputs.prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv make gcc-multilib g++-multilib clang

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: .deps/exts-linux
          key: ${{ needs.deps-exts-linux.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build Linux extension
        shell: bash
        run: make build-exts-linux

      - name: Resolve Linux artifact metadata
        id: artifact
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            echo "basename=srcds-autocomplete-$version-linux" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=srcds-autocomplete $version" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            main)
              echo "basename=srcds-autocomplete-latest-linux" >> "$GITHUB_OUTPUT"
              echo "release_tag=channel/latest" >> "$GITHUB_OUTPUT"
              echo "release_name=Latest" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "basename=srcds-autocomplete-develop-linux" >> "$GITHUB_OUTPUT"
              echo "release_tag=channel/develop" >> "$GITHUB_OUTPUT"
              echo "release_name=Develop" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "basename=srcds-autocomplete-${GITHUB_SHA::7}-linux" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Upload Linux build tree
        uses: actions/upload-artifact@v7
        with:
          name: exts-build-linux
          path: .build/linux-l4d2
          if-no-files-found: error
          retention-days: 1

  release-linux:
    runs-on: ubuntu-22.04
    needs: build-exts-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make

      - name: Download Linux build tree
        uses: actions/download-artifact@v8
        with:
          name: exts-build-linux
          path: .build/linux-l4d2

      - name: Package Linux extension tree
        run: make package-exts-linux

      - name: Create Linux release zip
        run: make release-linux RELEASE_BASENAME="${{ needs.build-exts-linux.outputs.basename }}"

      - name: Validate Linux artifact
        env:
          EXTS_ARTIFACT_DIR: ${{ github.workspace }}/dist/linux/artifact
          EXTS_PLATFORM: linux
        run: bash ./scripts/ci-validate-artifact.sh

      - name: Upload Linux release zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.build-exts-linux.outputs.basename }}
          path: dist/release/${{ needs.build-exts-linux.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

  deps-exts-windows:
    runs-on: windows-2022
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve dependency cache key
        id: cache-key
        shell: bash
        run: |
          echo "key=exts-windows-deps-${{ runner.os }}-${{ hashFiles('scripts/fetch-windows-deps.ps1', 'scripts/build-windows-l4d2.ps1', 'scripts/stage-artifact.py', 'scripts/package-release.py', 'plugin-package-map.json', 'Makefile', 'configure.py', 'AMBuildScript', 'PackageScript') }}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        id: deps-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: .deps/exts-windows
          key: ${{ steps.cache-key.outputs.key }}

      - name: Fetch Windows extension dependencies
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: make deps-exts-windows

      - name: Save dependency cache
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .deps/exts-windows
          key: ${{ steps.cache-key.outputs.key }}

  build-exts-windows:
    runs-on: windows-2022
    needs: deps-exts-windows
    outputs:
      basename: ${{ steps.artifact.outputs.basename }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: .deps/exts-windows
          key: ${{ needs.deps-exts-windows.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build Windows extension
        shell: pwsh
        run: make build-exts-windows

      - name: Resolve Windows artifact metadata
        id: artifact
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            echo "basename=srcds-autocomplete-$version-windows" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            main)
              echo "basename=srcds-autocomplete-latest-windows" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "basename=srcds-autocomplete-develop-windows" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "basename=srcds-autocomplete-${GITHUB_SHA::7}-windows" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Upload Windows build tree
        uses: actions/upload-artifact@v7
        with:
          name: exts-build-windows
          path: .build/windows-l4d2
          if-no-files-found: error
          retention-days: 1

  release-windows:
    runs-on: windows-2022
    needs: build-exts-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download Windows build tree
        uses: actions/download-artifact@v8
        with:
          name: exts-build-windows
          path: .build/windows-l4d2

      - name: Package Windows extension tree
        shell: pwsh
        run: make package-exts-windows

      - name: Create Windows release zip
        shell: pwsh
        run: make release-windows RELEASE_BASENAME="${{ needs.build-exts-windows.outputs.basename }}"

      - name: Validate Windows artifact
        shell: bash
        env:
          EXTS_ARTIFACT_DIR: ${{ github.workspace }}/dist/windows/artifact
          EXTS_PLATFORM: windows
        run: bash ./scripts/ci-validate-artifact.sh

      - name: Upload Windows release zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.build-exts-windows.outputs.basename }}
          path: dist/release/${{ needs.build-exts-windows.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

  publish:
    runs-on: ubuntu-22.04
    needs: [build-exts-linux, build-exts-windows, release-linux, release-windows]
    if: github.ref_type == 'branch' || (github.ref_type == 'tag' && startsWith(github.ref_name, 'v'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Linux release artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-exts-linux.outputs.basename }}
          path: dist/release

      - name: Download Windows release artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-exts-windows.outputs.basename }}
          path: dist/release

      - name: Move channel tag
        if: github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'develop')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ needs.build-exts-linux.outputs.release-tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ needs.build-exts-linux.outputs.release-tag }}" --force

      - name: Publish channel release
        if: github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'develop')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ needs.build-exts-linux.outputs.release-tag }}"
          title="${{ needs.build-exts-linux.outputs.release-name }}"
          linux_asset="dist/release/${{ needs.build-exts-linux.outputs.basename }}.zip"
          windows_asset="dist/release/${{ needs.build-exts-windows.outputs.basename }}.zip"
          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "${{ needs.build-exts-linux.outputs.prerelease }}" == "true" ]]; then
              gh release edit "$tag" --title "$title" --prerelease --latest=false
            else
              gh release edit "$tag" --title "$title" --latest
            fi
          else
            if [[ "${{ needs.build-exts-linux.outputs.prerelease }}" == "true" ]]; then
              gh release create "$tag" --title "$title" --prerelease --latest=false --target "$GITHUB_SHA"
            else
              gh release create "$tag" --title "$title" --latest --target "$GITHUB_SHA"
            fi
          fi
          gh release upload "$tag" "$linux_asset" "$windows_asset" --clobber

      - name: Publish tagged release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          title="${{ needs.build-exts-linux.outputs.release-name }}"
          linux_asset="dist/release/${{ needs.build-exts-linux.outputs.basename }}.zip"
          windows_asset="dist/release/${{ needs.build-exts-windows.outputs.basename }}.zip"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --latest
          else
            gh release create "$tag" --title "$title" --verify-tag --latest
          fi
          gh release upload "$tag" "$linux_asset" "$windows_asset" --clobber
